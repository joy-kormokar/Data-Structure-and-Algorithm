<script>
const topics = [
  {
    title:"Traversal",
    sub:"Visit every element in the array",
    tags:["Forward","Reverse"],
    explain:"Traversal means accessing each element one by one. Forward goes index 0→n-1, Reverse goes n-1→0. Time: O(n), Space: O(1).",
    complexity:"O(n) time | O(1) space",
    visual:"traversal",
    code:`<span class="cm">// ===== ARRAY TRAVERSAL IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>

<span class="tp">int</span> <span class="fn">main</span>() {
    <span class="tp">int</span> arr[] = {<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>, <span class="num">40</span>, <span class="num">50</span>};
    <span class="tp">int</span> n = <span class="kw">sizeof</span>(arr) / <span class="kw">sizeof</span>(arr[<span class="num">0</span>]);

    <span class="cm">// Forward Traversal — O(n)</span>
    <span class="fn">printf</span>(<span class="str">"Forward:  "</span>);
    <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">0</span>; i &lt; n; i++) {
        <span class="fn">printf</span>(<span class="str">"%d "</span>, arr[i]);
    }
    <span class="fn">printf</span>(<span class="str">"\n"</span>);

    <span class="cm">// Reverse Traversal — O(n)</span>
    <span class="fn">printf</span>(<span class="str">"Reverse:  "</span>);
    <span class="kw">for</span> (<span class="tp">int</span> i = n - <span class="num">1</span>; i &gt;= <span class="num">0</span>; i--) {
        <span class="fn">printf</span>(<span class="str">"%d "</span>, arr[i]);
    }
    <span class="fn">printf</span>(<span class="str">"\n"</span>);

    <span class="kw">return</span> <span class="num">0</span>;
}
<span class="cm">/* Output:
   Forward:  10 20 30 40 50
   Reverse:  50 40 30 20 10  */</span>`
  },
  {
    title:"Searching",
    sub:"Find an element in the array",
    tags:["Linear Search O(n)","Binary Search O(log n)"],
    explain:"Linear Search checks every element — works on unsorted arrays. Binary Search splits the sorted array in half each step — much faster but needs sorted input.",
    complexity:"Linear: O(n) | Binary: O(log n)",
    visual:"search",
    code:`<span class="cm">// ===== SEARCHING IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>

<span class="cm">// Linear Search — O(n), works on any array</span>
<span class="tp">int</span> <span class="fn">linearSearch</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> target) {
    <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">0</span>; i &lt; n; i++) {
        <span class="kw">if</span> (arr[i] == target)
            <span class="kw">return</span> i;    <span class="cm">// found at index i</span>
    }
    <span class="kw">return</span> -<span class="num">1</span>;              <span class="cm">// not found</span>
}

<span class="cm">// Binary Search — O(log n), REQUIRES sorted array</span>
<span class="tp">int</span> <span class="fn">binarySearch</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> target) {
    <span class="tp">int</span> lo = <span class="num">0</span>, hi = n - <span class="num">1</span>;
    <span class="kw">while</span> (lo &lt;= hi) {
        <span class="tp">int</span> mid = lo + (hi - lo) / <span class="num">2</span>;  <span class="cm">// avoid overflow</span>
        <span class="kw">if</span> (arr[mid] == target) <span class="kw">return</span> mid;
        <span class="kw">else if</span> (arr[mid] &lt; target)  lo = mid + <span class="num">1</span>;
        <span class="kw">else</span>                          hi = mid - <span class="num">1</span>;
    }
    <span class="kw">return</span> -<span class="num">1</span>;
}

<span class="tp">int</span> <span class="fn">main</span>() {
    <span class="tp">int</span> sorted[] = {<span class="num">5</span>, <span class="num">12</span>, <span class="num">23</span>, <span class="num">37</span>, <span class="num">45</span>, <span class="num">61</span>};
    <span class="tp">int</span> n = <span class="num">6</span>;
    <span class="fn">printf</span>(<span class="str">"Linear: index = %d\n"</span>, <span class="fn">linearSearch</span>(sorted, n, <span class="num">37</span>));
    <span class="fn">printf</span>(<span class="str">"Binary: index = %d\n"</span>, <span class="fn">binarySearch</span>(sorted, n, <span class="num">37</span>));
    <span class="kw">return</span> <span class="num">0</span>;
}
<span class="cm">/* Output:
   Linear: index = 3
   Binary: index = 3  */</span>`
  },
  {
    title:"Sorting",
    sub:"Arrange elements in order",
    tags:["Bubble","Selection","Insertion","Quick","Merge"],
    explain:"Sorting arranges elements. Bubble/Selection/Insertion are O(n²) simple sorts. Quick Sort is O(n log n) average — fast in practice. Merge Sort is O(n log n) always — stable.",
    complexity:"Bubble/Select/Insert: O(n²) | Quick/Merge: O(n log n)",
    visual:"sort",
    code:`<span class="cm">// ===== SORTING ALGORITHMS IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>

<span class="cm">// Utility: swap two integers</span>
<span class="tp">void</span> <span class="fn">swap</span>(<span class="tp">int</span> *a, <span class="tp">int</span> *b) {
    <span class="tp">int</span> t = *a; *a = *b; *b = t;
}

<span class="cm">// 1. Bubble Sort — O(n²)</span>
<span class="tp">void</span> <span class="fn">bubbleSort</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {
    <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">0</span>; i &lt; n-<span class="num">1</span>; i++)
        <span class="kw">for</span> (<span class="tp">int</span> j = <span class="num">0</span>; j &lt; n-i-<span class="num">1</span>; j++)
            <span class="kw">if</span> (arr[j] &gt; arr[j+<span class="num">1</span>])
                <span class="fn">swap</span>(&amp;arr[j], &amp;arr[j+<span class="num">1</span>]);
}

<span class="cm">// 2. Selection Sort — O(n²)</span>
<span class="tp">void</span> <span class="fn">selectionSort</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {
    <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">0</span>; i &lt; n-<span class="num">1</span>; i++) {
        <span class="tp">int</span> minIdx = i;
        <span class="kw">for</span> (<span class="tp">int</span> j = i+<span class="num">1</span>; j &lt; n; j++)
            <span class="kw">if</span> (arr[j] &lt; arr[minIdx]) minIdx = j;
        <span class="fn">swap</span>(&amp;arr[minIdx], &amp;arr[i]);
    }
}

<span class="cm">// 3. Insertion Sort — O(n²), best for small/nearly-sorted</span>
<span class="tp">void</span> <span class="fn">insertionSort</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {
    <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">1</span>; i &lt; n; i++) {
        <span class="tp">int</span> key = arr[i], j = i - <span class="num">1</span>;
        <span class="kw">while</span> (j &gt;= <span class="num">0</span> &amp;&amp; arr[j] &gt; key)
            arr[j+<span class="num">1</span>] = arr[j--];
        arr[j+<span class="num">1</span>] = key;
    }
}

<span class="cm">// 4. Quick Sort — O(n log n) avg, O(n²) worst</span>
<span class="tp">int</span> <span class="fn">partition</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> lo, <span class="tp">int</span> hi) {
    <span class="tp">int</span> pivot = arr[hi], i = lo - <span class="num">1</span>;
    <span class="kw">for</span> (<span class="tp">int</span> j = lo; j &lt; hi; j++)
        <span class="kw">if</span> (arr[j] &lt;= pivot)
            <span class="fn">swap</span>(&amp;arr[++i], &amp;arr[j]);
    <span class="fn">swap</span>(&amp;arr[i+<span class="num">1</span>], &amp;arr[hi]);
    <span class="kw">return</span> i + <span class="num">1</span>;
}
<span class="tp">void</span> <span class="fn">quickSort</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> lo, <span class="tp">int</span> hi) {
    <span class="kw">if</span> (lo &lt; hi) {
        <span class="tp">int</span> p = <span class="fn">partition</span>(arr, lo, hi);
        <span class="fn">quickSort</span>(arr, lo, p-<span class="num">1</span>);
        <span class="fn">quickSort</span>(arr, p+<span class="num">1</span>, hi);
    }
}

<span class="cm">// 5. Merge Sort — O(n log n), stable</span>
<span class="tp">void</span> <span class="fn">merge</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> l, <span class="tp">int</span> m, <span class="tp">int</span> r) {
    <span class="tp">int</span> n1=m-l+<span class="num">1</span>, n2=r-m, L[n1], R[n2];
    <span class="kw">for</span>(<span class="tp">int</span> i=<span class="num">0</span>;i&lt;n1;i++) L[i]=arr[l+i];
    <span class="kw">for</span>(<span class="tp">int</span> j=<span class="num">0</span>;j&lt;n2;j++) R[j]=arr[m+<span class="num">1</span>+j];
    <span class="tp">int</span> i=<span class="num">0</span>,j=<span class="num">0</span>,k=l;
    <span class="kw">while</span>(i&lt;n1 &amp;&amp; j&lt;n2) arr[k++]=(L[i]&lt;=R[j])?L[i++]:R[j++];
    <span class="kw">while</span>(i&lt;n1) arr[k++]=L[i++];
    <span class="kw">while</span>(j&lt;n2) arr[k++]=R[j++];
}
<span class="tp">void</span> <span class="fn">mergeSort</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> l, <span class="tp">int</span> r) {
    <span class="kw">if</span> (l &lt; r) {
        <span class="tp">int</span> m = l + (r-l)/<span class="num">2</span>;
        <span class="fn">mergeSort</span>(arr, l, m);
        <span class="fn">mergeSort</span>(arr, m+<span class="num">1</span>, r);
        <span class="fn">merge</span>(arr, l, m, r);
    }
}`
  },
  {
    title:"Insertion & Deletion",
    sub:"Add or remove elements from the array",
    tags:["Insert at index","Delete at index","Shift elements"],
    explain:"Insertion at index k requires shifting elements right from k to n-1. Deletion requires shifting left. Both are O(n) in worst case. Arrays have fixed size in C, so we manage size manually.",
    complexity:"O(n) — due to shifting",
    visual:"insertdel",
    code:`<span class="cm">// ===== INSERTION & DELETION IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>
<span class="pp">#define</span> MAX <span class="num">20</span>

<span class="cm">// Insert element at position pos</span>
<span class="tp">int</span> <span class="fn">insertAt</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> *n, <span class="tp">int</span> pos, <span class="tp">int</span> val) {
    <span class="kw">if</span> (*n &gt;= MAX || pos &lt; <span class="num">0</span> || pos &gt; *n)
        <span class="kw">return</span> -<span class="num">1</span>;                <span class="cm">// invalid</span>
    <span class="cm">// Shift elements RIGHT from pos</span>
    <span class="kw">for</span> (<span class="tp">int</span> i = *n; i &gt; pos; i--)
        arr[i] = arr[i-<span class="num">1</span>];
    arr[pos] = val;             <span class="cm">// place new value</span>
    (*n)++;
    <span class="kw">return</span> <span class="num">0</span>;
}

<span class="cm">// Delete element at position pos</span>
<span class="tp">int</span> <span class="fn">deleteAt</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> *n, <span class="tp">int</span> pos) {
    <span class="kw">if</span> (pos &lt; <span class="num">0</span> || pos &gt;= *n)
        <span class="kw">return</span> -<span class="num">1</span>;
    <span class="cm">// Shift elements LEFT from pos+1</span>
    <span class="kw">for</span> (<span class="tp">int</span> i = pos; i &lt; *n-<span class="num">1</span>; i++)
        arr[i] = arr[i+<span class="num">1</span>];
    (*n)--;
    <span class="kw">return</span> <span class="num">0</span>;
}

<span class="tp">void</span> <span class="fn">printArr</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {
    <span class="kw">for</span>(<span class="tp">int</span> i=<span class="num">0</span>;i&lt;n;i++) <span class="fn">printf</span>(<span class="str">"%d "</span>,arr[i]);
    <span class="fn">printf</span>(<span class="str">"\n"</span>);
}

<span class="tp">int</span> <span class="fn">main</span>() {
    <span class="tp">int</span> arr[MAX] = {<span class="num">10</span>,<span class="num">20</span>,<span class="num">40</span>,<span class="num">50</span>}, n = <span class="num">4</span>;
    <span class="fn">printArr</span>(arr, n);           <span class="cm">// 10 20 40 50</span>
    <span class="fn">insertAt</span>(arr, &amp;n, <span class="num">2</span>, <span class="num">30</span>);   <span class="cm">// insert 30 at index 2</span>
    <span class="fn">printArr</span>(arr, n);           <span class="cm">// 10 20 30 40 50</span>
    <span class="fn">deleteAt</span>(arr, &amp;n, <span class="num">1</span>);       <span class="cm">// delete index 1 (value 20)</span>
    <span class="fn">printArr</span>(arr, n);           <span class="cm">// 10 30 40 50</span>
    <span class="kw">return</span> <span class="num">0</span>;
}`
  },
  {
    title:"Update / Modify",
    sub:"Change value at a given index",
    tags:["Direct access O(1)","Index-based update"],
    explain:"Updating is the simplest operation. Direct index access arr[i] = newVal is O(1) constant time — one of arrays' biggest advantages over linked lists.",
    complexity:"O(1) — direct access",
    visual:"update",
    code:`<span class="cm">// ===== UPDATE / MODIFY IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>

<span class="cm">// Update element at index — O(1)</span>
<span class="tp">void</span> <span class="fn">updateAt</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> idx, <span class="tp">int</span> val) {
    <span class="kw">if</span> (idx &lt; <span class="num">0</span> || idx &gt;= n) {
        <span class="fn">printf</span>(<span class="str">"Invalid index!\n"</span>);
        <span class="kw">return</span>;
    }
    arr[idx] = val;   <span class="cm">// direct memory write — O(1)</span>

<span class="cm">// Multiply all elements by factor</span>

<span class="cm">// Build prefix sum array — O(n)</span>
<span class="tp">void</span> <span class="fn">buildPrefix</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> prefix[], <span class="tp">int</span> n) {

<span class="cm">// Range sum query [l, r] — O(1)</span>
<span class="tp">int</span> <span class="fn">rangeSum</span>(<span class="tp">int</span> prefix[], <span class="tp">int</span> l, <span class="tp">int</span> r) {

<span class="cm">// Pair Sum: find pair with given sum — O(n)</span>
<span class="cm">// REQUIRES sorted array</span>
<span class="tp">int</span> <span class="fn">pairSum</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> target) {
    <span class="tp">int</span> L = <span class="num">0</span>, R = n - <span class="num">1</span>;
    <span class="kw">while</span> (L &lt; R) {
        <span class="tp">int</span> s = arr[L] + arr[R];
        <span class="kw">if</span> (s == target) {
            <span class="fn">printf</span>(<span class="str">"Pair: (%d, %d)\n"</span>, arr[L], arr[R]);
            L++; R--;          <span class="cm">// look for more pairs</span>
        } <span class="kw">else if</span> (s &lt; target)
            L++;               <span class="cm">// need bigger sum</span>
        <span class="kw">else</span>
            R--;               <span class="cm">// need smaller sum</span>
    }
    <span class="kw">return</span> <span class="num">0</span>;
}

<span class="tp">int</span> <span class="fn">removeDupsSorted</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {

}

    visual:"window",
    code:`<span class="cm">// ===== SLIDING WINDOW IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>

<span class="cm">// Max sum of subarray of size k — O(n)</span>
<span class="tp">int</span> <span class="fn">maxSumWindow</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> k) {
    <span class="kw">if</span> (k &gt; n) <span class="kw">return</span> -<span class="num">1</span>;

    <span class="cm">// Build sum of first window</span>
    <span class="tp">int</span> wSum = <span class="num">0</span>;
    <span class="kw">for</span> (<span class="tp">int</span> i=<span class="num">0</span>; i&lt;k; i++) wSum += arr[i];
    <span class="tp">int</span> maxSum = wSum;

    <span class="cm">// Slide window: remove left, add right</span>
    <span class="kw">for</span> (<span class="tp">int</span> i=k; i&lt;n; i++) {
        wSum += arr[i] - arr[i-k];   <span class="cm">// slide!</span>
        <span class="kw">if</span> (wSum &gt; maxSum) maxSum = wSum;
    }
    <span class="kw">return</span> maxSum;
}

<span class="cm">// Kadane's Algorithm — max sum ANY subarray — O(n)</span>
<span class="tp">int</span> <span class="fn">maxSubarraySum</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {
    <span class="tp">int</span> cur = arr[<span class="num">0</span>], best = arr[<span class="num">0</span>];
    <span class="kw">for</span> (<span class="tp">int</span> i=<span class="num">1</span>; i&lt;n; i++) {
        <span class="cm">// extend current window or start fresh</span>
        cur  = (arr[i] &gt; cur + arr[i]) ? arr[i] : cur + arr[i];
        best = (cur &gt; best) ? cur : best;
    }
    <span class="kw">return</span> best;
}

<span class="cm">// Generate all subarrays — O(n²) or O(n³)</span>
<span class="tp">void</span> <span class="fn">generateSubarrays</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n) {
    <span class="kw">for</span> (<span class="tp">int</span> i=<span class="num">0</span>; i&lt;n; i++) {      <span class="cm">// start</span>
        <span class="kw">for</span> (<span class="tp">int</span> j=i; j&lt;n; j++) {   <span class="cm">// end</span>

        }

<span class="cm">// Kadane's Algorithm — max sum subarray — O(n)</span>
<span class="tp">int</span> <span class="fn">kadane</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n,
           <span class="tp">int</span> *startIdx, <span class="tp">int</span> *endIdx) {
    <span class="tp">int</span> maxSoFar = INT_MIN, maxEndHere = <span class="num">0</span>;
    <span class="tp">int</span> s = <span class="num">0</span>, es = <span class="num">0</span>;
    *startIdx = <span class="num">0</span>; *endIdx = <span class="num">0</span>;

    <span class="kw">for</span> (<span class="tp">int</span> i=<span class="num">0</span>; i&lt;n; i++) {
        maxEndHere += arr[i];
        <span class="kw">if</span> (maxEndHere &gt; maxSoFar) {
            maxSoFar = maxEndHere;
            *startIdx = s;
            *endIdx   = i;
        }
        <span class="kw">if</span> (maxEndHere &lt; <span class="num">0</span>) {
            maxEndHere = <span class="num">0</span>;
            s = i + <span class="num">1</span>;
        }
    }
    <span class="kw">return</span> maxSoFar;
}

    complexity:"O(n) time | O(1) space",
    visual:"reverse",
    code:`<span class="cm">// ===== REVERSE & ROTATION IN C =====</span>

<span class="pp">#include</span> <span class="str">&lt;stdio.h&gt;</span>

<span class="tp">void</span> <span class="fn">swap</span>(<span class="tp">int</span> *a, <span class="tp">int</span> *b) { <span class="tp">int</span> t=*a;*a=*b;*b=t; }

<span class="cm">// Reverse arr[l..r] — O(n)</span>
<span class="tp">void</span> <span class="fn">reverse</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> l, <span class="tp">int</span> r) {
    <span class="kw">while</span> (l &lt; r)
        <span class="fn">swap</span>(&amp;arr[l++], &amp;arr[r--]);
}

<span class="cm">// Left rotate by k positions — O(n), O(1) space</span>
<span class="cm">// Trick: reverse [0..k-1], reverse [k..n-1], reverse all</span>
<span class="tp">void</span> <span class="fn">leftRotate</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> k) {
    k %= n;                          <span class="cm">// handle k >= n</span>
    <span class="fn">reverse</span>(arr, <span class="num">0</span>, k-<span class="num">1</span>);            <span class="cm">// step 1</span>
    <span class="fn">reverse</span>(arr, k, n-<span class="num">1</span>);            <span class="cm">// step 2</span>
    <span class="fn">reverse</span>(arr, <span class="num">0</span>, n-<span class="num">1</span>);            <span class="cm">// step 3</span>
}

<span class="cm">// Right rotate by k positions</span>
<span class="tp">void</span> <span class="fn">rightRotate</span>(<span class="tp">int</span> arr[], <span class="tp">int</span> n, <span class="tp">int</span> k) {
    k %= n;
    <span class="fn">leftRotate</span>(arr, n, n - k);       <span class="cm">// right = left(n-k)</span>
}

    <span class="kw">for</span>(<span class="tp">int</span> i=<span class="num">0</span>;i&lt;n;i++) <span class="fn">printf</span>(<span class="str">"%d ",a[i]);

function makeCell(val,idx,cls=''){
  return `<div class="cell ${cls}"><span>${val}</span><span class="idx">${idx}</span></div>`;
}
function makeArr(vals, classes=[], withPointers=null){
  let cells = vals.map((v,i)=>makeCell(v,i,classes[i]||'')).join('');
  let row = `<div class="array-row">${cells}</div>`;
  if(withPointers){
    let ptrs = vals.map((_,i)=>{
      let lbl='';
      if(withPointers.L===i) lbl='L';
      else if(withPointers.R===i) lbl='R';
      else if(withPointers.M===i) lbl='M';
      return `<div class="ptr ${lbl}">${lbl?'▲':''}</div>`;
    }).join('');
    row += `<div class="pointer-row">${ptrs}</div>`;
  }
  return row;
}

function renderTraversal(step, dir){
  const data = [10,20,30,40,50];
  const cls = data.map((_,i)=>{
    if(dir==='fwd') return i<step?'done':(i===step?'hi':'');
    else return i>4-step?'done':(i===4-step?'hi':'');
  });
  document.getElementById('vis-arr').innerHTML = makeArr(data, cls);
  document.getElementById('vis-status').textContent = dir==='fwd'
    ? `Visiting index ${step}: arr[${step}] = ${data[step]}`
    : `Visiting index ${4-step}: arr[${4-step}] = ${data[4-step]}`;
}
function renderSearch(step, mode){
  const data = [5,12,23,37,45,61];
  const target=37;
  let lo=0,hi=5,mid,found=-1;
  let cls=data.map(()=>'');
  let status='';
  if(mode==='linear'){
    cls=data.map((_,i)=>i<step?'done':(i===step?'hi':''));
    if(data[step]===target){cls[step]='win';status=`Found 37 at index ${step}!`;}
    else status=`Checking index ${step}: ${data[step]} ≠ 37`;
  } else {
    // binary steps
    const steps=[[0,5,2],[3,5,4],[3,3,3]];
    if(step<steps.length){
      [lo,hi,mid]=steps[step];
      cls[mid]='hi';
      for(let i=0;i<lo;i++) cls[i]='done';
      for(let i=hi+1;i<6;i++) cls[i]='done';
      status=`lo=${lo} hi=${hi} mid=${mid}: arr[${mid}]=${data[mid]} ${data[mid]===target?'== ✓':'< target → search right'}`;
    } else {
      cls[3]='win'; status='Found 37 at index 3! ✓';
    }
  }
  document.getElementById('vis-arr').innerHTML = makeArr(data, cls);
  document.getElementById('vis-status').textContent = status;
}
function renderSort(){
  const orig=[64,34,25,90,12,22];
  const passes=[];
  const arr=[...orig];
  for(let i=0;i<arr.length-1;i++){for(let j=0;j<arr.length-i-1;j++){if(arr[j]>arr[j+1]){let t=arr[j];arr[j]=arr[j+1];arr[j+1]=t;}passes.push({arr:[...arr],done:arr.length-1-i});}}
  return passes;
}

function renderBars(data, doneFrom=-1, swapAt=-1){
  const max=Math.max(...data);
  return `<div class="bar-row">${data.map((v,i)=>{
    let cls='';
    if(i>=doneFrom&&doneFrom>=0) cls='done-bar';
    else if(i===swapAt||i===swapAt+1) cls='swap-bar';
    const h=Math.round(v/max*72);
    return `<div class="bar ${cls}" style="height:${h}px">${v}</div>`;
  }).join('')}</div>
  <div style="display:flex;gap:4px">${data.map((_,i)=>`<div class="arr-label">${i}</div>`).join('')}</div>`;
}

// ---- State ----
let visState = {};

function resetVisState(){
  visState = {step:0, dir:'fwd', sortArr:[64,34,25,90,12,22], sortPasses:null,
    insArr:[10,20,40,50], insN:4,

    grArr:[7,1,5,3,6,4], grStep:0, grMin:999, grProfit:0,

}
resetVisState();

// Traversal
window.stepVis = function(dir){

};

};

// Search
let searchStep={linear:0, binary:0};
window.stepSearch = function(mode){
  const data=[5,12,23,37,45,61];
  renderSearch(mode==='linear'?searchStep.linear:searchStep.binary, mode);
  if(mode==='linear') searchStep.linear = Math.min(searchStep.linear+1,5);
  else searchStep.binary = Math.min(searchStep.binary+1,3);
};

// Sort
let sortData=[64,34,25,90,12,22], sortIdx=0, sortPasses=[];
function initSortPasses(){
  let arr=[...sortData];
  const orig=[64,34,25,90,12,22];
  arr=[...orig]; sortPasses=[];
  for(let i=0;i<arr.length-1;i++){
    for(let j=0;j<arr.length-i-1;j++){
      if(arr[j]>arr[j+1]){let t=arr[j];arr[j]=arr[j+1];arr[j+1]=t;}
      sortPasses.push({arr:[...arr],swapAt:j,doneFrom:arr.length-1-i+1});
    }
  }
}
initSortPasses();
window.stepSort = function(){
  if(sortIdx>=sortPasses.length){document.getElementById('vis-status').textContent='Sorting complete!';return;}
  const {arr,swapAt,doneFrom}=sortPasses[sortIdx++];
  document.getElementById('sort-vis').innerHTML=renderBars(arr,doneFrom,swapAt);
  document.getElementById('vis-status').textContent=`Swapped arr[${swapAt}]=${arr[swapAt]} and arr[${swapAt+1}]=${arr[swapAt+1]}`;
};
window.resetSort = function(){
  sortIdx=0;
  document.getElementById('sort-vis').innerHTML=renderBars([64,34,25,90,12,22]);
  document.getElementById('vis-status').textContent='Bubble Sort — click to step';
};

// Insert/Delete
let idArr=[10,20,40,50];
window.doInsert = function(){
  idArr=[10,20,30,40,50];
  const cls=idArr.map((_,i)=>i===2?'hi':'done');

  document.getElementById('vis-status').textContent='Inserted 30 at index 2 — elements shifted right';
};
window.doDelete = function(){
  const cls=idArr.map((_,i)=>i===1?'swap':'');
  document.getElementById('vis-arr').innerHTML=makeArr(idArr,cls);
  setTimeout(()=>{
    idArr.splice(1,1);
    document.getElementById('vis-arr').innerHTML=makeArr(idArr,idArr.map(()=>'done'));

window.doUpdate = function(){

// Frequency
window.buildFreq = function(){
  const arr=[3,1,4,1,5,3,2,1,6];
  const freq={};
  arr.forEach(v=>freq[v]=(freq[v]||0)+1);
  const maxF=Math.max(...Object.values(freq));
  const keys=Object.keys(freq).sort((a,b)=>a-b);
  let html='<div style="margin-top:10px"><div class="section-label">Frequency</div><div style="display:flex;gap:6px;align-items:flex-end;height:60px">';
  keys.forEach(k=>{
    const h=Math.round(freq[k]/maxF*50);
    const cls=freq[k]>1?'swap':'hi';
    html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <span style="font-size:11px;color:var(--accent2)">${freq[k]}</span>
      <div class="bar ${cls}" style="height:${h}px;width:30px">${k}</div></div>`;
  });
  html+='</div></div>';
  document.getElementById('freq-bars').innerHTML=html;
  document.getElementById('vis-status').textContent='Most frequent: 1 (appears 3 times) | Duplicates: 1, 3';
};
window.resetFreq = function(){
  document.getElementById('freq-bars').innerHTML='';
  document.getElementById('vis-status').textContent='Click to count';
};

// Prefix
let pfxBuilt=false;
const pfxData=[3,1,4,1,5,9];
const pfx=[0,3,4,8,9,14,23];
window.buildPfx = function(){
  pfxBuilt=true;
  document.getElementById('pref-row').innerHTML=
    `<div class="section-label">Prefix sum array</div>`+makeArr(pfx,pfx.map((_,i)=>i===0?'lo':'hi'));
  document.getElementById('vis-status').textContent='Prefix built: [0,3,4,8,9,14,23] — now O(1) queries!';
};
window.queryPfx = function(){
  if(!pfxBuilt){document.getElementById('vis-status').textContent='Build prefix first!';return;}
  const cls=pfxData.map((_,i)=>i>=1&&i<=4?'win':'');
  document.getElementById('vis-arr').innerHTML=makeArr(pfxData,cls);
  document.getElementById('vis-status').textContent='sum[1..4] = prefix[5]-prefix[1] = 14-3 = 11 ✓';
};
window.resetPfx = function(){
  pfxBuilt=false;
  document.getElementById('vis-arr').innerHTML=makeArr(pfxData);
  document.getElementById('pref-row').innerHTML='';
  document.getElementById('vis-status').textContent='Click Build to create prefix array';
};

// Two pointer
let tpL=0,tpR=4,tpData=[1,3,5,7,9],tpTarget=10;
window.stepTwoPtr = function(){
  if(tpL>=tpR){document.getElementById('vis-status').textContent='All pairs found!';return;}
  const s=tpData[tpL]+tpData[tpR];
  const cls=tpData.map((_,i)=>i===tpL?'lo':i===tpR?'rp':'');
  document.getElementById('vis-arr').innerHTML=makeArr(tpData,cls,{L:tpL,R:tpR});
  if(s===tpTarget){
    document.getElementById('vis-status').textContent=`✓ Pair found: (${tpData[tpL]},${tpData[tpR]}) sum=${s}`;
    tpL++;tpR--;
  } else if(s<tpTarget){
    document.getElementById('vis-status').textContent=`Sum=${s} < ${tpTarget} → move L right`;
    tpL++;
  } else {
    document.getElementById('vis-status').textContent=`Sum=${s} > ${tpTarget} → move R left`;
    tpR--;
  }
};
window.resetTwoPtr = function(){
  tpL=0;tpR=4;
  document.getElementById('vis-arr').innerHTML=makeArr(tpData,[],{L:0,R:4});
  document.getElementById('vis-status').textContent='Target = 10 | Click to step';
};

// Sliding window
let winStart=0,winData=[2,1,5,1,3,2],winK=3;
window.stepWin = function(){
  if(winStart+winK>winData.length){document.getElementById('vis-status').textContent='Window reached end!';return;}
  const cls=winData.map((_,i)=>i>=winStart&&i<winStart+winK?'win':'');
  document.getElementById('vis-arr').innerHTML=makeArr(winData,cls);
  const s=winData.slice(winStart,winStart+winK).reduce((a,b)=>a+b,0);
  document.getElementById('vis-status').textContent=`Window[${winStart}..${winStart+winK-1}] sum = ${s}${s===9?' ← MAXIMUM!':''}`;
  winStart++;
};
window.resetWin = function(){
  winStart=0;
  document.getElementById('vis-arr').innerHTML=makeArr(winData);
  document.getElementById('vis-status').textContent='Window of size 3 — finding maximum sum';
};

// Subarray
window.highlightSub = function(){
  const d=[1,2,3,4,5];
  document.getElementById('vis-arr').innerHTML=makeArr(d,d.map(()=>'win'));
  document.getElementById('vis-status').textContent='Max subarray = entire array [1,2,3,4,5] sum=15';

  document.getElementById('vis-arr').innerHTML=makeArr([1,2,3,4,5]);

// Reverse/Rotate
let revArr=[1,2,3,4,5];
window.doReverse = function(){
  revArr=[...revArr].reverse();
  document.getElementById('vis-arr').innerHTML=makeArr(revArr,revArr.map(()=>'hi'));
  document.getElementById('vis-status').textContent='Reversed: two pointers swapping from both ends';
};
window.doRotateL = function(){
  revArr=[1,2,3,4,5];
  const k=2,n=5;
  revArr=[...revArr.slice(k),...revArr.slice(0,k)];
  document.getElementById('vis-arr').innerHTML=makeArr(revArr,revArr.map((_,i)=>i<n-k?'done':'hi'));
  document.getElementById('vis-status').textContent='Left rotated by 2: [1,2,3,4,5] → [3,4,5,1,2]';
};
window.doRotateR = function(){
  revArr=[1,2,3,4,5];
  const k=2,n=5;
  revArr=[...revArr.slice(n-k),...revArr.slice(0,n-k)];
  document.getElementById('vis-arr').innerHTML=makeArr(revArr,revArr.map((_,i)=>i<k?'hi':'done'));
  document.getElementById('vis-status').textContent='Right rotated by 2: [1,2,3,4,5] → [4,5,1,2,3]';
};
window.resetRev = function(){
  revArr=[1,2,3,4,5];
  document.getElementById('vis-arr').innerHTML=makeArr(revArr);
  document.getElementById('vis-status').textContent='Original array';
};

// MinMax
let mmArr=[3,1,7,9,2,5], mmStep=0, mmMin=999, mmMax=-999, mmSum=0;
window.stepMinMax = function(){
  if(mmStep>=mmArr.length){document.getElementById('vis-status').textContent='Scan complete!';return;}
  const v=mmArr[mmStep];
  if(v<mmMin) mmMin=v;
  if(v>mmMax) mmMax=v;
  mmSum+=v;
  const cls=mmArr.map((_,i)=>i<mmStep?'done':i===mmStep?'hi':'');
  document.getElementById('vis-arr').innerHTML=makeArr(mmArr,cls);
  document.getElementById('mm-min').textContent=mmMin;
  document.getElementById('mm-max').textContent=mmMax;
  document.getElementById('mm-sum').textContent=mmSum;
  document.getElementById('vis-status').textContent=`Checking arr[${mmStep}]=${v}`;
  mmStep++;
};
window.resetMM = function(){
  mmStep=0;mmMin=999;mmMax=-999;mmSum=0;
  document.getElementById('vis-arr').innerHTML=makeArr(mmArr);
  ['mm-min','mm-max','mm-sum'].forEach(id=>document.getElementById(id).textContent='?');
  document.getElementById('vis-status').textContent='Click to scan';
};

// Duplicates
let dupArr=[4,2,7,2,5,4,1];
window.showDups = function(){
  const freq={};
  dupArr.forEach(v=>freq[v]=(freq[v]||0)+1);
  const cls=dupArr.map(v=>freq[v]>1?'swap':'hi');
  document.getElementById('vis-arr').innerHTML=makeArr(dupArr,cls);
  document.getElementById('vis-status').textContent='Amber = duplicates (2,4) | Teal = unique (7,5,1)';
};
window.doRemoveDups = function(){
  const seen=new Set(), res=[];
  dupArr.forEach(v=>{if(!seen.has(v)){seen.add(v);res.push(v);}});
  document.getElementById('vis-arr').innerHTML=makeArr(res,res.map(()=>'win'));
  document.getElementById('vis-status').textContent=`After removing: [${res.join(', ')}] — length ${res.length}`;
};
window.resetDups = function(){
  dupArr=[4,2,7,2,5,4,1];
  document.getElementById('vis-arr').innerHTML=makeArr(dupArr);
  document.getElementById('vis-status').textContent='Click to show duplicates';
};

// Greedy
let grArr=[7,1,5,3,6,4], grStep=0, grMin=999, grProfit=0;
window.stepGreedy = function(){
  if(grStep>=grArr.length){document.getElementById('vis-status').textContent='Best profit found!';return;}
  const v=grArr[grStep];
  if(v<grMin) grMin=v;
  const diff=v-grMin;
  if(diff>grProfit) grProfit=diff;
  const cls=grArr.map((_,i)=>i<grStep?'done':i===grStep?'hi':'');
  document.getElementById('vis-arr').innerHTML=makeArr(grArr,cls);
  document.getElementById('gr-min').textContent=grMin;
  document.getElementById('gr-profit').textContent=grProfit;
  document.getElementById('vis-status').textContent=`Day ${grStep}: price=${v} | buy at ${grMin}, profit=${diff}`;
  grStep++;
};
window.resetGreedy = function(){
  grStep=0;grMin=999;grProfit=0;
  document.getElementById('vis-arr').innerHTML=makeArr(grArr);
  ['gr-min','gr-profit'].forEach(id=>document.getElementById(id).textContent='?');
  document.getElementById('vis-status').textContent='Click to step through greedy';
};

// ---- Render topic ----
function selectTopic(idx){
  document.querySelectorAll('.sidebar-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  resetVisState();
  const t = topics[idx];
  document.getElementById('content').innerHTML = `
    <div class="topic-title">${idx+1}. ${t.title}</div>
    <p class="topic-sub">${t.sub}</p>
    <div class="subtopics">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
    <p class="explain">${t.explain}</p>
    <div class="info-grid">
      <div class="info-card"><h4>Time & Space</h4><p>${t.complexity}</p></div>
      <div class="info-card"><h4>Category</h4><p>Array — Topic ${idx+1}/15</p></div>
    </div>
    <div class="section-label">Interactive Visual</div>
    <div class="visual-box">${visuals[t.visual]()}</div>
    <div class="section-label">C Code</div>
    <div class="code-box">
      <div class="code-header">
        <div class="dot" style="background:#ff5f57"></div>
        <div class="dot" style="background:#febc2e"></div>
        <div class="dot" style="background:#28c840"></div>
        <span style="margin-left:8px">${t.title.toLowerCase().replace(/ /g,'_')}.c</span>
      </div>
      <div class="code-body"><pre>${t.code}</pre></div>
    </div>`;

  // re-init sort passes when sort topic selected
  if(t.visual==='sort'){sortIdx=0;initSortPasses();}
  // reinit two-ptr
  if(t.visual==='twoptr'){tpL=0;tpR=4;document.getElementById('vis-arr').innerHTML=makeArr(tpData,[],{L:0,R:4});}
}

selectTopic(0);
